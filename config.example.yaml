# Generated by init_project.py — rename to config.yaml and fill in your values,
# OR run init_project.py to generate this file interactively.

project:
  workbook_id: "YOUR-WORKBOOK-ID-HERE"
  worksheet_name: "YOUR-WORKSHEET-NAME-HERE"
  time_delta_days: 1460   # 4 years

signals:
  - id: "SIGNAL-ID-1"
    name: Forca_A
    original_name: "Full signal name from Seeq"
    type: Signal
  - id: "SIGNAL-ID-2"
    name: Forca_B
    original_name: "Full signal name from Seeq"
    type: Signal

# IDs específicos dos sinais de SKU — NÃO use a URL da worksheet (puxa todos os
# sinais e falha se qualquer um deles tiver dados corrompidos no PI).
sku_signals:
  - id: "SIGNAL-ID-B1-PRODUCT"
    name: bag1_sku
    original_name: "B1_Product Code signal name from Seeq"
    type: Signal
  - id: "SIGNAL-ID-B2-PRODUCT"
    name: bag2_sku
    original_name: "B2_Product Code signal name from Seeq"
    type: Signal

preprocessing:
  delta_col_a: Forca_A
  delta_col_b: Forca_B
  iqr_multiplier: 1.0    # 1.0 = aggressive filter, 2.0 = conservative

# ── Parâmetros do motor de gatilho (trigger_engine.py v2.1) ─────────────────
trigger:
  # Weibull — calibrado sobre 26 ciclos históricos FB14
  weibull_beta: 1.181
  weibull_eta_h: 1297.0         # horas (= 54.05 dias)

  # Fórmula p_risk: age_risk + (1-age_risk) × signal_score × boost_sinal
  boost_sinal: 0.65

  # ── Gatilho RED (todas as condições simultâneas) ───────────────────────────
  limiar_p_risk: 0.48           # C1: probabilidade combinada
  limiar_signal_score: 0.22     # C2: evidência mínima de degradação
  idade_minima_dias: 15         # C3: dias mínimos de ciclo (acomodamento)
  proj_48h_limiar: 800.0        # C4: projeção de força em 48h (N)
  sustentacao_proj_dias: 2      # C4: mínimo de dias abaixo do limiar (janela 5d)
  cooldown_h: 48                # horas de silêncio após disparo RED
  snooze_dias: 5                # dias de snooze após confirmação do operador

  # ── Gatilho AMARELO — anomalia detectada (aviso precoce) ──────────────────
  amarelo_p_risk: 0.35          # p_risk suficiente para aviso amarelo
  amarelo_signal: 0.15          # OU signal_score acima deste patamar
  amarelo_cooldown_h: 72        # horas de silêncio entre alertas AMARELO

  # ── Gatilho EMERGÊNCIA (C5) — força crítica abaixo de 800 N ───────────────
  forca_min_emergencia: 800.0   # N — mínimo nos últimos 3 dias
  emergencia_cooldown_h: 48     # horas de silêncio entre alertas EMERGÊNCIA

  # ── Gatilho REVISÃO — resumo automático por marcos de idade ───────────────
  revisao_marcos_dias: [20, 25, 35]   # dias do ciclo que geram revisão automática

  # ── Gatilho OUTLIER_SINAL — leitura anômala isolada (v2.3) ───────────────
  # Dispara INFO (não CRITICA) quando min_3d < limiar mas o evento é isolado
  # (apenas 1 leitura abaixo em 3d) e o sinal geral está saudável.
  # Pesquisa histórica: 81 % dos eventos <800 N são transientes — o time
  # continuou rodando com mediana de 34 dias até a próxima troca.
  outlier_forca_limiar: 800.0   # N — mesmo gate da EMERGENCIA
  outlier_mediana_ok:   950.0   # N — mediana mínima para classificar como outlier
  outlier_n_max:        1       # máx de leituras abaixo do limiar na janela 3d
  outlier_cooldown_h:   48      # horas de silêncio entre alertas OUTLIER_SINAL
