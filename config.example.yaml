# Generated by init_project.py — rename to config.yaml and fill in your values,
# OR run init_project.py to generate this file interactively.

project:
  workbook_id: "YOUR-WORKBOOK-ID-HERE"
  worksheet_name: "YOUR-WORKSHEET-NAME-HERE"
  time_delta_days: 1460   # 4 years

signals:
  - id: "SIGNAL-ID-1"
    name: Forca_A
    original_name: "Full signal name from Seeq"
    type: Signal
  - id: "SIGNAL-ID-2"
    name: Forca_B
    original_name: "Full signal name from Seeq"
    type: Signal

# IDs específicos dos sinais de SKU — NÃO use a URL da worksheet (puxa todos os
# sinais e falha se qualquer um deles tiver dados corrompidos no PI).
sku_signals:
  - id: "SIGNAL-ID-B1-PRODUCT"
    name: bag1_sku
    original_name: "B1_Product Code signal name from Seeq"
    type: Signal
  - id: "SIGNAL-ID-B2-PRODUCT"
    name: bag2_sku
    original_name: "B2_Product Code signal name from Seeq"
    type: Signal

preprocessing:
  delta_col_a: Forca_A
  delta_col_b: Forca_B
  iqr_multiplier: 1.0    # 1.0 = aggressive filter, 2.0 = conservative

# ── Parâmetros do motor de gatilho (trigger_engine.py v3.0) ─────────────────
trigger:
  # Weibull — calibrado sobre ciclos históricos da máquina
  weibull_beta: 1.181
  weibull_eta_h: 1297.0         # horas (= 54.05 dias)

  # Fórmula p_risk: age_risk + (1-age_risk) × signal_score × boost_sinal
  boost_sinal: 0.65

  # ── Ajuste de vida de referência pelo ano vigente ─────────────────────────
  # V = Eta - (d × w)  |  d = Eta_dias - mean_vida_ano_vigente
  # 0.0 = ignora experiência recente  |  1.0 = só média do ano vigente
  vida_decay_w: 0.8

  # ── Gatilho RED (todas as condições simultâneas) ───────────────────────────
  limiar_p_risk: 0.48           # C1: probabilidade combinada
  limiar_signal_score: 0.22     # C2: evidência mínima de degradação
  idade_minima_dias: 15         # C3: dias mínimos de ciclo (acomodamento)
  proj_48h_limiar: 800.0        # C4: projeção de força em 48h (N)
  sustentacao_proj_dias: 2      # C4: mínimo de dias consecutivos abaixo (janela 5d)
  cooldown_h: 48                # horas de silêncio após disparo RED
  snooze_dias: 5                # dias de snooze após confirmação do operador

  # ── Gatilho AVISO — aviso precoce ────────────────────────────────────────
  aviso_p_risk: 0.35            # p_risk suficiente para aviso
  aviso_signal: 0.15            # OU signal_score acima deste patamar
  aviso_cooldown_h: 72          # horas de silêncio entre alertas AVISO

  # ── Gatilho RISCO — leitura anômala isolada (INFO) ────────────────────────
  # Força < limiar, evento isolado (n ≤ risco_n_max) e sinal geral saudável.
  # Pesquisa histórica: 81% dos eventos <800 N são transientes.
  risco_forca_limiar: 800.0     # N — gate de força mínima
  risco_mediana_ok:   950.0     # N — mediana mínima para classificar como isolado
  risco_n_max:        1         # máx de leituras abaixo do limiar na janela 3d
  risco_cooldown_h:   48        # horas de silêncio entre alertas RISCO

  # ── Gatilho CRITICO — força crítica confirmada (ALTA) ─────────────────────
  # Força < limiar + p_risk ≥ mínimo + evento NÃO isolado.
  critico_forca_min:  800.0     # N — força mínima absoluta
  critico_p_risk_min: 0.30      # p_risk mínimo para escalar de RISCO para CRITICO
  critico_cooldown_h: 48        # horas de silêncio entre alertas CRITICO

  # ── Gatilho EMERGENCIAL — avaliação cumulativa (CRITICA) ──────────────────
  # Dispara quando o quadro completo indica fim de vida próximo.
  # NÃO é evento pontual — é avaliação de múltiplos critérios no ciclo.
  emergencial_min_eventos: 3    # mínimo de eventos força < 800 N no ciclo atual
  emergencial_idade_frac:  0.85 # fração de eta_ajustado para considerar "próximo do fim"
  emergencial_p_risk_min:  0.40 # p_risk mínimo
  emergencial_cooldown_h:  48   # horas de silêncio entre alertas EMERGENCIAL
  # A condição MM7d declinante (atual < 3 dias atrás) é sempre checada.

  # ── Gatilho REVISÃO — marcos automáticos de ciclo ─────────────────────────
  revisao_marcos_dias: [20, 25, 35]   # dias do ciclo que geram revisão automática
